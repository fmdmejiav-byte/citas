<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>
    <link rel="stylesheet" href="/static/css/registro.css">
</head>
<body>
    <div class="contenedor">
        <h2>Registro de Ciudadano</h2>
        <form action="/guardar" method="POST">
            <label>Nombre Completo</label>
            <input type="text" name="nombre" required>
            <label>Documento (8-10 dígitos)</label>
            <input type="text" name="numeroDocumento" pattern="[0-9]{8,10}" required>
            <label>Puesto de Votación</label>
            <select name="puesto_id" required>
                <option value="">Seleccione un puesto</option>
                {% for puesto in puestos %}
                <option value="{{ puesto.id }}">{{ puesto.nombre_puesto }}</option>
                {% endfor %}
            </select>
            <button type="submit">Finalizar Registro</button>
        </form>
    </div>
</body>
</html>
